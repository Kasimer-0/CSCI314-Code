<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platform Manager Portal · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-800 flex h-screen overflow-hidden">

    <div id="messageModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform border border-slate-100">
            <div class="p-8 text-center">
                <div id="messageIcon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"></div>
                <h3 id="messageTitle" class="text-xl font-black text-slate-900 mb-2">Notification</h3>
                <p id="messageText" class="text-sm text-slate-500 mb-6"></p>
                <button onclick="closeMessage()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-all">OK</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[90] p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden border border-slate-100">
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">⚠️</div>
                <h3 id="confirmTitle" class="text-xl font-black text-slate-900 mb-2">Confirm Action</h3>
                <p id="confirmText" class="text-sm text-slate-500 mb-6"></p>
                <div class="flex gap-3">
                    <button onclick="closeConfirm()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200">Cancel</button>
                    <button id="confirmExecuteBtn" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl hover:bg-rose-600 shadow-lg shadow-rose-100">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[80] p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden border border-slate-100">
            <div class="p-10">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span id="detailLabel" class="text-[10px] font-black bg-violet-600 text-white px-2 py-1 rounded uppercase tracking-widest">CATEGORY</span>
                        <h3 id="detailMainTitle" class="text-3xl font-black text-slate-900 mt-3">Title</h3>
                    </div>
                    <button onclick="closeDetail()" class="text-2xl text-slate-300 hover:text-slate-900">&times;</button>
                </div>
                <div id="detailContent" class="space-y-4 bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8">
                    </div>
                <button onclick="closeDetail()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition-all">Close View</button>
            </div>
        </div>
    </div>

    <div id="editCategoryModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[80] p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md overflow-hidden transform transition-all border border-slate-100">
            <div class="p-10">
                <div class="mb-8">
                    <div class="text-xs font-bold uppercase tracking-widest text-violet-500 mb-2">Category Action</div>
                    <h3 class="text-2xl font-black text-slate-900">Update Category</h3>
                </div>

                <div class="space-y-4 mb-8">
                    <input type="hidden" id="editCatId">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Category Name</label>
                        <input type="text" id="editCatName" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500 font-bold text-slate-800 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Description</label>
                        <input type="text" id="editCatDesc" class="w-full px-5 py-3 bg-slate-50 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500 text-slate-600 transition-all">
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="closeEditCategory()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-xl hover:bg-slate-200 transition-all">Cancel</button>
                    <button onclick="submitUpdateCategory()" class="flex-2 bg-violet-600 text-white font-bold py-4 px-8 rounded-xl hover:bg-violet-700 transition-all shadow-lg active:scale-95">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
    <div class="w-64 bg-slate-900 text-white flex flex-col justify-between shadow-2xl z-20 relative">
        <div class="p-8">
            <h1 class="text-2xl font-extrabold text-white flex items-center gap-2 mb-10 tracking-tight">
                <span class="text-violet-400">📊 System</span>HQ
            </h1>
            <nav class="flex flex-col gap-3">
                <button onclick="switchTab('categories')" id="nav-categories" class="text-left px-4 py-3 rounded-xl bg-slate-800 text-violet-400 font-bold transition-all">🏷️ Categories</button>
                <button onclick="switchTab('reports')" id="nav-reports" class="text-left px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-semibold transition-all">📉 Data Reports</button>
            </nav>
        </div>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-rose-400 font-bold bg-rose-400/10 hover:bg-rose-400/20 rounded-xl transition-colors">🚪 Logout</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full bg-slate-50 overflow-y-auto relative">
        <header class="glass-panel sticky top-0 px-10 py-6 border-b border-slate-200 z-10 flex justify-between items-center">
            <div>
                <h2 id="pageTitle" class="text-3xl font-extrabold text-slate-900 tracking-tight">Category Management</h2>
                <p id="pageSubtitle" class="text-sm text-slate-500 font-medium mt-1">Organize fundraising activities globally</p>
            </div>
            
            <div id="searchContainer" class="flex gap-2 w-96">
                <input type="text" id="searchInput" placeholder="Search category name..." class="w-full px-4 py-2 border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-violet-500 text-sm">
                <button onclick="executeSearch()" class="bg-slate-900 text-white px-5 py-2 rounded-xl font-bold hover:bg-slate-800 text-sm">Search</button>
            </div>
        </header>

        <div class="p-10">
            <div id="section-categories">
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm mb-8 flex gap-4 items-end">
                    <div class="w-1/3">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Category Name</label>
                        <input type="text" id="createCatName" placeholder="e.g., Education" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:outline-none focus:bg-white focus:ring-2 focus:ring-violet-500 transition-all">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Description</label>
                        <input type="text" id="createCatDesc" placeholder="Optional description..." class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:outline-none focus:bg-white focus:ring-2 focus:ring-violet-500 transition-all">
                    </div>
                    <button onclick="createCategory()" class="bg-violet-600 text-white font-bold px-6 py-3 rounded-xl hover:bg-violet-700 h-[50px] shadow-lg shadow-violet-100 transition-all">Add Category</button>
                </div>
                <div id="categoryList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="section-reports" class="hidden">
                <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm mb-8 text-center">
                    <h3 class="text-xl font-bold text-slate-800 mb-6 tracking-tight">Select Reporting Period</h3>
                    <div class="flex justify-center gap-4">
                        <button onclick="generateReport('daily')" class="w-40 bg-indigo-50 text-indigo-600 border-2 border-indigo-200 font-bold py-4 rounded-2xl hover:bg-indigo-100 hover:border-indigo-300 transition-all shadow-sm">📅 Daily</button>
                        <button onclick="generateReport('weekly')" class="w-40 bg-violet-50 text-violet-600 border-2 border-violet-200 font-bold py-4 rounded-2xl hover:bg-violet-100 hover:border-violet-300 transition-all shadow-sm">📆 Weekly</button>
                        <button onclick="generateReport('monthly')" class="w-40 bg-fuchsia-50 text-fuchsia-600 border-2 border-fuchsia-200 font-bold py-4 rounded-2xl hover:bg-fuchsia-100 hover:border-fuchsia-300 transition-all shadow-sm">🗓️ Monthly</button>
                    </div>
                </div>

                <div id="reportCanvas" class="hidden">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-2xl font-black text-slate-800">System Report: <span id="repTypeLabel" class="text-violet-600">--</span></h3>
                        <span id="repDate" class="bg-slate-200 text-slate-600 font-mono text-xs font-bold px-3 py-1 rounded-lg">Period: --</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-slate-900 p-8 rounded-[2rem] shadow-xl text-white">
                            <div class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Total Donations</div>
                            <div class="text-4xl font-black text-emerald-400" id="repFunds">$0.00</div>
                        </div>
                        <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                            <div class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">Transactions</div>
                            <div class="text-4xl font-black text-slate-800" id="repTrans">0</div>
                        </div>
                        <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                            <div class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">New Campaigns</div>
                            <div class="text-4xl font-black text-violet-600" id="repCamps">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="platform_manager.js"></script>
</body>
</html>
