<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter flex items-center justify-center px-4 py-10">

    <main class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 px-8 py-10">
            <!-- Brand -->
            <div class="flex flex-col items-center mb-6">
                <div class="flex items-center gap-2.5">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-lg">FS</div>
                    <span class="text-xl font-bold text-slate-900">Fundraising System</span>
                </div>
            </div>

            <h1 class="text-2xl font-bold text-slate-900 text-center">Welcome back</h1>
            <p class="text-sm text-slate-500 text-center mt-1">Sign in to continue to your account</p>

            <!-- Validation error -->
            <div id="errorBox" class="hidden mt-5 bg-rose-50 text-rose-700 text-sm p-3 rounded-xl border border-rose-100">
                <span id="errorText"></span>
            </div>

            <form id="loginForm" class="mt-6 space-y-5" novalidate>
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
                    <input type="email" id="email" placeholder="you@example.com"
                           class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                        <a href="s5-reset-password.html" class="text-sm text-blue-600 font-medium hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••••••"
                           class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
                </div>

                <label class="flex items-center gap-2 text-sm text-slate-600">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                    Remember me for 30 days
                </label>

                <button type="submit" id="signInBtn"
                        class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-blue-700 transition shadow-sm">
                    Sign in
                </button>
            </form>

            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-slate-200"></div>
                <span class="text-xs uppercase tracking-wider text-slate-400 font-semibold">OR</span>
                <div class="flex-1 h-px bg-slate-200"></div>
            </div>

            <button id="googleBtn" type="button"
                    class="w-full bg-white border border-slate-300 py-2.5 rounded-xl text-sm font-semibold text-slate-700 hover:bg-slate-50 transition flex items-center justify-center gap-2">
                <span class="w-3 h-3 rounded-full bg-rose-500 inline-block"></span>
                Continue with Google
            </button>

            <p class="text-sm text-slate-500 text-center mt-6">
                New to Fundraising System? <a href="s9-Registration.html" class="text-blue-600 font-semibold hover:underline">Create one</a>
            </p>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6">
            Demo accounts: <span class="font-mono">vadmin@example.com</span>, <span class="font-mono">linh.nguyen@givehub.org</span>, <span class="font-mono">jordan.chen@givehub.org</span>
        </p>
    </main>

    <script src="data.js"></script>
    <script src="s1-login.js"></script>
</body>
</html>
