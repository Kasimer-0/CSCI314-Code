<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC 61 - Manage Account Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 flex flex-col font-inter items-center justify-center pt-10">

    <main class="w-full max-w-lg px-6">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            
            <!-- 表单头部 -->
            <div class="px-8 py-6 border-b border-slate-100 bg-slate-50">
                <div class="flex items-center gap-2 mb-1">
                    <span class="bg-rose-100 text-rose-700 text-xs px-2 py-1 rounded font-bold">UC #61</span>
                </div>
                <h2 class="text-2xl font-bold text-slate-900">Manage Account Status</h2>
                <p class="text-sm text-slate-500 mt-1">Suspend rule-violating accounts or reactivate them.</p>
            </div>

            <!-- UC 61 Alternative Flow 1, 2, 3: 错误提示区 -->
            <div id="errorMessage" class="hidden mx-8 mt-5 bg-rose-50 text-rose-700 text-sm p-4 rounded-xl border border-rose-100 font-medium"></div>

            <!-- UC 61 Normal Flow 6: 成功提示区 -->
            <div id="successMessage" class="hidden mx-8 mt-5 bg-emerald-50 text-emerald-700 text-sm p-4 rounded-xl border border-emerald-100 font-semibold">
                Account status updated successfully! Returning to list...
            </div>

            <!-- 表单内容区 (Normal Flow 2 & 4) -->
            <div class="p-8 space-y-6">
                
                <!-- 当前用户信息展示 (只读) -->
                <div class="bg-slate-50 border border-slate-100 p-4 rounded-xl flex items-center justify-between">
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Target User</p>
                        <p id="targetName" class="font-bold text-slate-900 text-base"></p>
                        <p id="targetEmail" class="text-sm text-slate-500"></p>
                    </div>
                    <div id="currentStatusBadge">
                        <!-- 动态注入当前状态Badge -->
                    </div>
                </div>

                <!-- 动态操作提示区 -->
                <div id="actionWarning" class="p-4 rounded-xl text-sm font-medium border">
                    <!-- 根据状态切换红色封禁提示或绿色解封提示 -->
                </div>

                <!-- 强制填写操作原因 (Normal Flow 4) -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Reason for Status Change *</label>
                    <textarea id="reasonInput" rows="4" placeholder="Please provide a detailed reason for this action..." class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 resize-none"></textarea>
                    <p class="text-xs text-slate-500 mt-2">A reason is strictly required to proceed for audit purposes.</p>
                </div>
            </div>

            <!-- 按钮操作区 (Normal Flow 5 & Sub Flow 1) -->
            <div class="px-8 py-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button id="cancelBtn" class="px-6 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-300 rounded-xl hover:bg-slate-50 transition">Cancel</button>
                <button id="confirmBtn" class="px-6 py-2.5 text-sm font-semibold text-white rounded-xl transition shadow-sm">
                    <!-- 按钮文字和颜色由 JS 决定 -->
                    Confirm Action
                </button>
            </div>

        </div>
    </main>

    <script src="data.js"></script>
    <script src="s11-account_suspension-admin.js"></script>
</body>
</html>
