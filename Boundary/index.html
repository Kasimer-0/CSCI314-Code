<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Login · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .role-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .role-card:hover { transform: translateY(-5px); }
        .role-selected { border-width: 3px !important; transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 relative">

    <div id="messageModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4 transition-all">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform border border-slate-100">
            <div class="p-8 text-center">
                <div id="messageIcon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"></div>
                <h3 id="messageTitle" class="text-xl font-black text-slate-900 mb-2">Notification</h3>
                <p id="messageText" class="text-sm text-slate-500 mb-6"></p>
                <button onclick="closeMessage()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-all shadow-lg active:scale-95">OK</button>
            </div>
        </div>
    </div>
    <div class="max-w-4xl w-full z-10">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-3">Charity Impact Portal</h1>
            <p class="text-slate-500 font-medium">Select your role to access the fundraising management system</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            
            <div onclick="selectRole('admin')" id="card-admin" class="role-card cursor-pointer bg-white p-6 rounded-[2rem] border-2 border-transparent shadow-sm flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-slate-900 text-white rounded-2xl flex items-center justify-center text-2xl mb-4 shadow-lg shadow-slate-200">A</div>
                <h3 class="font-bold text-slate-900">User Admin</h3>
                <p class="text-xs text-slate-400 mt-1">Accounts & Profiles</p>
            </div>

            <div onclick="selectRole('donee')" id="card-donee" class="role-card cursor-pointer bg-white p-6 rounded-[2rem] border-2 border-transparent shadow-sm flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-2xl mb-4 shadow-lg shadow-emerald-100">💚</div>
                <h3 class="font-bold text-slate-900">Donee</h3>
                <p class="text-xs text-slate-400 mt-1">Impact & Giving</p>
            </div>

            <div onclick="selectRole('fundraiser')" id="card-fundraiser" class="role-card cursor-pointer bg-white p-6 rounded-[2rem] border-2 border-transparent shadow-sm flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-amber-500 text-white rounded-2xl flex items-center justify-center text-2xl mb-4 shadow-lg shadow-amber-100">✨</div>
                <h3 class="font-bold text-slate-900">Fundraiser</h3>
                <p class="text-xs text-slate-400 mt-1">Launch Campaigns</p>
            </div>

            <div onclick="selectRole('platform')" id="card-platform" class="role-card cursor-pointer bg-white p-6 rounded-[2rem] border-2 border-transparent shadow-sm flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-violet-600 text-white rounded-2xl flex items-center justify-center text-2xl mb-4 shadow-lg shadow-violet-100">📈</div>
                <h3 class="font-bold text-slate-900">Platform Mgr</h3>
                <p class="text-xs text-slate-400 mt-1">Data & Categories</p>
            </div>
        </div>

        <div id="loginSection" class="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 hidden">
            <div class="text-center mb-8">
                <h2 id="formTitle" class="text-2xl font-bold text-slate-900">Login</h2>
                <p id="formSubtitle" class="text-sm text-slate-500 mt-1">Please enter your credentials</p>
            </div>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full px-5 py-4 border border-slate-200 rounded-2xl bg-slate-50 focus:outline-none focus:ring-2 transition-all font-medium">
                <input type="password" id="password" placeholder="Password" value="password123" class="w-full px-5 py-4 border border-slate-200 rounded-2xl bg-slate-50 focus:outline-none focus:ring-2 transition-all font-medium">
                <button onclick="handleLogin()" id="loginBtn" class="w-full text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-slate-200 mt-4 active:scale-95 flex justify-center items-center gap-2">
                    <span id="loginBtnText">Sign In</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';
        let selectedRole = null;

        const roleConfigs = {
            admin: {
                title: "Admin Portal",
                color: "slate-900",
                ring: "focus:ring-slate-900",
                btn: "bg-slate-900 hover:bg-slate-800",
                endpoint: "/user-admin/login",
                redirect: "user_admin_boundary.html",
                storage: "adminToken"
            },
            donee: {
                title: "Donee Portal",
                color: "emerald-500",
                ring: "focus:ring-emerald-500",
                btn: "bg-emerald-500 hover:bg-emerald-600",
                endpoint: "/donee/login",
                redirect: "donee_boundary.html",
                storage: "doneeToken"
            },
            fundraiser: {
                title: "Fundraiser Portal",
                color: "amber-500",
                ring: "focus:ring-amber-500",
                btn: "bg-amber-500 hover:bg-amber-600",
                endpoint: "/fundraiser/login",
                redirect: "fundraiser_boundary.html",
                storage: "fundToken"
            },
            platform: {
                title: "Manager Portal",
                color: "violet-600",
                ring: "focus:ring-violet-600",
                btn: "bg-violet-600 hover:bg-violet-700",
                endpoint: "/platform/login",
                redirect: "platform_manager_boundary.html",
                storage: "pmToken"
            }
        };

        // --- Modal frame control functions---
        function showMessage(title, text, isError = false) {
            const icon = document.getElementById('messageIcon');
            icon.innerHTML = isError ? '❌' : '✅';
            icon.className = `w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl ${isError ? 'bg-rose-50 text-rose-500' : 'bg-emerald-50 text-emerald-500'}`;
            document.getElementById('messageTitle').innerText = title;
            document.getElementById('messageText').innerText = text;
            document.getElementById('messageModal').classList.remove('hidden');
        }

        function closeMessage() { 
            document.getElementById('messageModal').classList.add('hidden'); 
        }

        function selectRole(role) {
            selectedRole = role;
            const config = roleConfigs[role];

            // 1. Update card styles
            Object.keys(roleConfigs).forEach(r => {
                const card = document.getElementById(`card-${r}`);
                card.classList.remove('role-selected', 'border-slate-900', 'border-emerald-500', 'border-amber-500', 'border-violet-600');
            });
            const activeCard = document.getElementById(`card-${role}`);
            activeCard.classList.add('role-selected', `border-${config.color}`);

            // 2. Display and update form content
            const loginSection = document.getElementById('loginSection');
            loginSection.classList.remove('hidden');
            
            document.getElementById('formTitle').innerText = config.title;
            document.getElementById('formTitle').className = `text-2xl font-bold text-${config.color}`;
            
            const emailInput = document.getElementById('email');
            emailInput.className = `w-full px-5 py-4 border border-slate-200 rounded-2xl bg-slate-50 focus:outline-none focus:ring-2 ${config.ring} transition-all font-medium`;
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.className = `w-full text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-slate-200 mt-4 active:scale-95 flex justify-center items-center gap-2 ${config.btn}`;

            // Automatically focus on the email input box and scroll.
            setTimeout(() => emailInput.focus(), 100);
            loginSection.scrollIntoView({ behavior: 'smooth' });
        }

        async function handleLogin() {
            if (!selectedRole) return;
            const config = roleConfigs[selectedRole];
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                return showMessage("Authentication Failed", "Please enter both email and password.", true);
            }

            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            
            // Button state change (Loading effect)
            loginBtn.disabled = true;
            btnText.innerText = "Authenticating...";

            try {
                const res = await fetch(`${API}${config.endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem(config.storage, data.access_token);
                    // Use a modal prompt when logging in successfully to enhance the sense of ceremony.
                    showMessage("Access Granted", "Redirecting to your workspace...");
                    setTimeout(() => {
                        window.location.href = config.redirect;
                    }, 800); // Give the user a moment to see the success message
                } else {
                    // Use a modal prompt instead of alert
                    showMessage("Login Failed", data.detail || "Invalid credentials provided.", true);
                }
            } catch (err) {
                // Use a modal prompt instead of alert, handle network errors
                showMessage("Connection Error", "Cannot reach the server. Please ensure the backend is running.", true);
            } finally {
                // Restore button state
                loginBtn.disabled = false;
                btnText.innerText = "Sign In";
            }
        }
    </script>
</body>
</html>
