<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fundraiser Boundary · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter">

    <!-- Login -->
    <div id="loginView" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-96">
            <h2 class="text-2xl font-bold text-amber-600 mb-6 text-center">Fundraiser Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" class="w-full mb-4 px-4 py-2 border rounded-xl bg-slate-50">
            <input type="password" id="loginPass" placeholder="Password" class="w-full mb-6 px-4 py-2 border rounded-xl bg-slate-50">
            <button onclick="login()" class="w-full bg-amber-500 text-white font-bold py-2 rounded-xl hover:bg-amber-600">Enter Dashboard</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardView" class="hidden">
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0">
            <div class="font-bold text-xl text-amber-600">📢 My Campaigns</div>
            <div class="space-x-4">
                <button onclick="showTab('ongoingTab')" class="text-slate-600 font-bold hover:text-amber-600">Ongoing (S13-17)</button>
                <button onclick="showTab('historyTab')" class="text-slate-600 font-bold hover:text-amber-600">History (S22-23)</button>
                <button onclick="logout()" class="text-rose-500 font-bold ml-4">Sign Out</button>
            </div>
        </header>

        <main class="max-w-5xl mx-auto py-10 px-6">
            
            <!-- Ongoing Tab -->
            <div id="ongoingTab" class="tab-content">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
                    <h3 class="font-bold text-lg mb-4">Start a New Campaign (S13)</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="actTitle" placeholder="Campaign Title" class="col-span-2 px-4 py-2 border rounded-xl">
                        <textarea id="actDesc" placeholder="Story / Description" class="col-span-2 px-4 py-2 border rounded-xl h-24"></textarea>
                        <input type="number" id="actTarget" placeholder="Target Amount ($)" class="px-4 py-2 border rounded-xl">
                        <input type="number" id="actCat" placeholder="Category ID" value="1" class="px-4 py-2 border rounded-xl">
                        <button onclick="createActivity()" class="col-span-2 bg-amber-500 text-white px-6 py-3 rounded-xl font-bold">Publish Campaign</button>
                    </div>
                </div>

                <h3 class="font-bold text-xl mb-4">Manage Ongoing Campaigns (S14, S16, S17, S20)</h3>
                <div id="ongoingList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <!-- History Tab -->
            <div id="historyTab" class="tab-content hidden">
                <h3 class="font-bold text-xl mb-4">Past / Closed Campaigns (S22-S23)</h3>
                <div class="flex gap-4 mb-6">
                    <input type="text" id="searchHistory" placeholder="Search history..." class="flex-1 px-4 py-2 border rounded-xl">
                    <button onclick="loadHistory()" class="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold">Search</button>
                </div>
                <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

        </main>
    </div>

    <script>
        const API = "http://127.0.0.1:8000/fundraiser";
        let token = localStorage.getItem('fr_token') || "";

        if(token) toggleView(true);

        function toggleView(isLogged) {
            document.getElementById('loginView').classList.toggle('hidden', isLogged);
            document.getElementById('dashboardView').classList.toggle('hidden', !isLogged);
            if(isLogged) { showTab('ongoingTab'); loadOngoing(); }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            if(tabId === 'historyTab') loadHistory();
        }

        async function login() {
            const res = await fetch(`${API}/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPass').value })
            });
            if (res.ok) {
                token = (await res.json()).access_token;
                localStorage.setItem('fr_token', token);
                toggleView(true);
            } else alert("Login Failed!");
        }

        function logout() { localStorage.removeItem('fr_token'); location.reload(); }
        const getHeaders = () => ({ 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' });

        async function createActivity() {
            const body = JSON.stringify({
                title: document.getElementById('actTitle').value, description: document.getElementById('actDesc').value,
                target_amount: parseFloat(document.getElementById('actTarget').value), category_id: parseInt(document.getElementById('actCat').value)
            });
            const res = await fetch(`${API}/activities`, { method: 'POST', headers: getHeaders(), body });
            if(res.ok) { alert("Published!"); loadOngoing(); } else alert("Failed");
        }

        async function loadOngoing() {
            const res = await fetch(`${API}/activities`, { headers: getHeaders() });
            const data = await res.json();
            document.getElementById('ongoingList').innerHTML = data.filter(a => a.status === 'Ongoing').map(act => `
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <h4 class="font-bold text-lg text-slate-800">${act.title}</h4>
                    <p class="text-sm text-slate-500 mt-1 mb-3 line-clamp-2">${act.description}</p>
                    <div class="flex justify-between text-sm font-bold mb-4">
                        <span class="text-amber-600">Goal: $${act.target_amount}</span>
                        <span class="text-emerald-600">Raised: $${act.current_amount}</span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-slate-400 bg-slate-50 p-2 rounded-lg mb-4">
                        <span>👁️ Views: ${act.view_count}</span>
                    </div>
                    <button onclick="suspendActivity(${act.activity_id})" class="w-full bg-rose-50 text-rose-600 font-bold py-2 rounded-xl hover:bg-rose-100">Suspend / Close</button>
                </div>
            `).join('');
        }

        async function suspendActivity(id) {
            await fetch(`${API}/activities/${id}/suspend`, { method: 'POST', headers: getHeaders() });
            loadOngoing();
        }

        async function loadHistory() {
            const q = document.getElementById('searchHistory').value;
            const res = await fetch(`${API}/history${q ? '?title='+q : ''}`, { headers: getHeaders() });
            const data = await res.json();
            document.getElementById('historyList').innerHTML = data.map(act => `
                <div class="bg-slate-100 p-5 rounded-2xl border border-slate-200 opacity-75">
                    <h4 class="font-bold text-slate-600">${act.title}</h4>
                    <p class="text-sm text-slate-500 mt-1">Goal: $${act.target_amount} | Final: $${act.current_amount}</p>
                    <span class="inline-block mt-2 px-3 py-1 bg-slate-200 text-slate-600 rounded-lg text-xs font-bold">${act.status}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
