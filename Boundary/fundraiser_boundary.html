<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fundraiser Boundary · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter">

    <div id="loginView" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-96">
            <h2 class="text-2xl font-bold text-amber-600 mb-6 text-center">Fundraiser Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" class="w-full mb-4 px-4 py-2 border rounded-xl bg-slate-50">
            <input type="password" id="loginPass" placeholder="Password" value="password123" class="w-full mb-6 px-4 py-2 border rounded-xl bg-slate-50">
            <button onclick="login()" class="w-full bg-amber-500 text-white font-bold py-2 rounded-xl hover:bg-amber-600">Enter Dashboard</button>
        </div>
    </div>

    <div id="dashboardView" class="hidden">
        <nav class="bg-white shadow-sm px-8 py-4 flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-xl font-bold text-amber-600">Fundraiser Workspace</h1>
            <button onclick="logout()" class="text-slate-500 font-medium hover:text-rose-500">Logout</button>
        </nav>

        <div class="max-w-6xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-fit">
                <h3 class="text-xl font-bold text-slate-800 mb-6">Launch Activity</h3>
                <input type="text" id="caTitle" placeholder="Campaign Title (Min 5 chars)" class="w-full mb-4 px-4 py-2 border rounded-xl bg-slate-50">
                <textarea id="caDesc" placeholder="Description (Min 10 chars)" class="w-full mb-4 px-4 py-2 border rounded-xl bg-slate-50 h-24"></textarea>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="number" id="caCat" placeholder="Category ID" class="w-full px-4 py-2 border rounded-xl bg-slate-50">
                    <input type="number" id="caGoal" placeholder="Goal ($)" class="w-full px-4 py-2 border rounded-xl bg-slate-50">
                </div>
                <button onclick="createActivity()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800">Launch Campaign</button>
            </div>

            <div class="col-span-2 space-y-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold text-slate-800 mb-4">My Ongoing Campaigns</h3>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="searchOngoing" placeholder="Search active titles..." class="flex-1 px-4 py-2 border rounded-xl bg-slate-50">
                        <button onclick="loadOngoing()" class="bg-amber-100 text-amber-700 px-6 font-bold rounded-xl">Search</button>
                    </div>
                    <div id="ongoingList" class="grid grid-cols-2 gap-4 max-h-[400px] overflow-y-auto"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold text-slate-800 mb-4">Campaign History</h3>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="searchHistory" placeholder="Search closed titles..." class="flex-1 px-4 py-2 border rounded-xl bg-slate-50">
                        <button onclick="loadHistory()" class="bg-slate-200 text-slate-700 px-6 font-bold rounded-xl">Search</button>
                    </div>
                    <div id="historyList" class="grid grid-cols-2 gap-4 max-h-[300px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000/fundraiser';
        
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('fundToken')}`
            };
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if(res.ok) {
                const data = await res.json();
                localStorage.setItem('fundToken', data.access_token);
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('dashboardView').classList.remove('hidden');
                loadOngoing();
                loadHistory();
            } else alert("Login failed");
        }

        function logout() {
            localStorage.removeItem('fundToken');
            location.reload();
        }

        async function createActivity() {
            const body = {
                title: document.getElementById('caTitle').value,
                description: document.getElementById('caDesc').value,
                category_id: parseInt(document.getElementById('caCat').value),
                target_amount: parseFloat(document.getElementById('caGoal').value),
                is_private: false
            };
            const res = await fetch(`${API}/activities`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) });
            if(res.ok) { alert("Created successfully!"); loadOngoing(); } 
            else { const err = await res.json(); alert("Error: " + err.detail); }
        }

        async function loadOngoing() {
            const q = document.getElementById('searchOngoing').value;
            const res = await fetch(`${API}/activities${q ? '?title='+q : ''}`, { headers: getHeaders() });
            const data = await res.json();
            document.getElementById('ongoingList').innerHTML = data.filter(a => a.status !== 'Suspended' && a.status !== 'Closed').map(act => `
                <div class="bg-amber-50 p-5 rounded-2xl border border-amber-100">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-amber-900">${act.title}</h4>
                        <button onclick="updateTitle(${act.activity_id})" class="text-xs text-amber-600 underline">Edit Title</button>
                    </div>
                    <p class="text-sm text-slate-500 mb-4">Goal: $${act.target_amount} | Raised: $${act.current_amount}</p>
                    <button onclick="suspendActivity(${act.activity_id})" class="w-full bg-rose-50 text-rose-600 font-bold py-2 rounded-xl hover:bg-rose-100">Suspend / Close</button>
                </div>
            `).join('');
        }

        async function updateTitle(id) {
            const newTitle = prompt("Enter new title:");
            if(!newTitle) return;
            const res = await fetch(`${API}/activities/${id}?title=${encodeURIComponent(newTitle)}`, { 
                method: 'PATCH', headers: getHeaders() 
            });
            if(res.ok) { alert("Updated"); loadOngoing(); }
        }

        async function suspendActivity(id) {
            await fetch(`${API}/activities/${id}/suspend`, { method: 'POST', headers: getHeaders() });
            loadOngoing();
            loadHistory();
        }

        async function loadHistory() {
            const q = document.getElementById('searchHistory').value;
            const res = await fetch(`${API}/history${q ? '?title='+q : ''}`, { headers: getHeaders() });
            const data = await res.json();
            document.getElementById('historyList').innerHTML = data.map(act => `
                <div class="bg-slate-100 p-5 rounded-2xl border border-slate-200 opacity-75">
                    <h4 class="font-bold text-slate-600">${act.title}</h4>
                    <p class="text-sm text-slate-500 mt-1">Goal: $${act.target_amount} | Final: $${act.current_amount}</p>
                    <span class="inline-block mt-2 px-2 py-1 bg-slate-200 text-slate-500 text-xs font-bold rounded">${act.status}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
