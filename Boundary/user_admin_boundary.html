<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Boundary · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter">

    <!-- Login Screen (Story 11) -->
    <div id="loginView" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-96">
            <h2 class="text-2xl font-bold text-slate-900 mb-6 text-center">User Admin Login</h2>
            <input type="email" id="loginEmail" placeholder="Admin Email" class="w-full mb-4 px-4 py-2 border rounded-xl bg-slate-50">
            <input type="password" id="loginPass" placeholder="Password" class="w-full mb-6 px-4 py-2 border rounded-xl bg-slate-50">
            <button onclick="login()" class="w-full bg-slate-900 text-white font-bold py-2 rounded-xl hover:bg-slate-800">Sign In</button>
            <p id="loginError" class="text-rose-500 text-sm mt-3 text-center hidden"></p>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardView" class="hidden flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col">
            <div class="p-6 border-b border-slate-800 font-bold text-white tracking-wider">🛡️ ADMIN CONSOLE</div>
            <nav class="p-4 space-y-2">
                <button onclick="showTab('accountsTab')" class="w-full text-left px-4 py-2 rounded-lg hover:bg-slate-800 hover:text-white">👥 User Accounts (S6-S10)</button>
                <button onclick="showTab('profilesTab')" class="w-full text-left px-4 py-2 rounded-lg hover:bg-slate-800 hover:text-white">👤 User Profiles (S1-S5)</button>
            </nav>
            <div class="mt-auto p-4 border-t border-slate-800">
                <button onclick="logout()" class="w-full text-left px-4 py-2 rounded-lg hover:bg-slate-800 text-rose-400">↩ Sign Out (S12)</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <h1 class="text-3xl font-bold text-slate-900 mb-8">System Management</h1>

            <!-- Accounts Tab -->
            <div id="accountsTab" class="tab-content">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
                    <h3 class="font-bold text-lg mb-4">Create Account (S6)</h3>
                    <div class="flex gap-4">
                        <input type="email" id="newAccEmail" placeholder="Email" class="flex-1 px-4 py-2 border rounded-xl">
                        <input type="password" id="newAccPass" placeholder="Password" class="flex-1 px-4 py-2 border rounded-xl">
                        <button onclick="createAccount()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Create</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-lg mb-4">Search & Manage Accounts (S7-S10)</h3>
                    <div class="flex gap-4 mb-4">
                        <input type="text" id="searchAccInput" placeholder="Search by email..." class="flex-1 px-4 py-2 border rounded-xl">
                        <button onclick="searchAccounts()" class="bg-slate-100 text-slate-700 px-6 py-2 rounded-xl font-bold border border-slate-200">Search</button>
                    </div>
                    <div id="accountsList" class="space-y-3"></div>
                </div>
            </div>

            <!-- Profiles Tab -->
            <div id="profilesTab" class="tab-content hidden">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
                    <h3 class="font-bold text-lg mb-4">Create Profile (S1)</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="profAccId" placeholder="Account ID Link" class="px-4 py-2 border rounded-xl">
                        <input type="text" id="profUser" placeholder="Username" class="px-4 py-2 border rounded-xl">
                        <select id="profRole" class="px-4 py-2 border rounded-xl bg-white">
                            <option value="1">Donee (1)</option><option value="2">Fundraiser (2)</option><option value="3">Manager (3)</option>
                        </select>
                        <button onclick="createProfile()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Create Profile</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-lg mb-4">Search & Manage Profiles (S2-S5)</h3>
                    <div class="flex gap-4 mb-4">
                        <input type="text" id="searchProfInput" placeholder="Search by username..." class="flex-1 px-4 py-2 border rounded-xl">
                        <button onclick="searchProfiles()" class="bg-slate-100 text-slate-700 px-6 py-2 rounded-xl font-bold border border-slate-200">Search</button>
                    </div>
                    <div id="profilesList" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = "http://127.0.0.1:8000/user-admin";
        let token = localStorage.getItem('admin_token') || "";

        if(token) toggleView(true);

        function toggleView(isLogged) {
            document.getElementById('loginView').classList.toggle('hidden', isLogged);
            document.getElementById('dashboardView').classList.toggle('hidden', !isLogged);
            if(isLogged) { showTab('accountsTab'); searchAccounts(); }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

        async function login() {
            const res = await fetch(`${API}/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPass').value })
            });
            if (res.ok) {
                token = (await res.json()).access_token;
                localStorage.setItem('admin_token', token);
                toggleView(true);
            } else alert("Login Failed!");
        }

        function logout() { localStorage.removeItem('admin_token'); location.reload(); }

        const getHeaders = () => ({ 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' });

        // Accounts Logic
        async function createAccount() {
            const body = JSON.stringify({ email: document.getElementById('newAccEmail').value, password: document.getElementById('newAccPass').value });
            const res = await fetch(`${API}/accounts`, { method: 'POST', headers: getHeaders(), body });
            if(res.ok) { alert("Account Created!"); searchAccounts(); } else alert("Failed");
        }

        async function searchAccounts() {
            const q = document.getElementById('searchAccInput').value;
            const res = await fetch(`${API}/accounts${q ? '?email='+q : ''}`, { headers: getHeaders() });
            const data = await res.json();
            const list = document.getElementById('accountsList');
            list.innerHTML = data.map(acc => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <div><b>ID: ${acc.account_id}</b> | ${acc.email} | Status: <span class="${acc.status === 'Suspended' ? 'text-rose-500' : 'text-emerald-500'} font-bold">${acc.status}</span></div>
                    <button onclick="suspendAccount(${acc.account_id})" class="text-rose-600 font-bold hover:underline">Suspend</button>
                </div>
            `).join('');
        }

        async function suspendAccount(id) {
            await fetch(`${API}/accounts/${id}/suspend`, { method: 'PATCH', headers: getHeaders() });
            searchAccounts();
        }

        // Profiles Logic
        async function createProfile() {
            const body = JSON.stringify({ account_id: parseInt(document.getElementById('profAccId').value), username: document.getElementById('profUser').value, role_id: parseInt(document.getElementById('profRole').value) });
            const res = await fetch(`${API}/profiles`, { method: 'POST', headers: getHeaders(), body });
            if(res.ok) { alert("Profile Created!"); searchProfiles(); } else alert("Failed");
        }

        async function searchProfiles() {
            const q = document.getElementById('searchProfInput').value;
            const res = await fetch(`${API}/profiles${q ? '?username='+q : ''}`, { headers: getHeaders() });
            const data = await res.json();
            const list = document.getElementById('profilesList');
            list.innerHTML = data.map(p => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <div><b>ID: ${p.profile_id}</b> | AccID: ${p.account_id} | Name: ${p.username} | Role: ${p.role_id}</div>
                    <button onclick="suspendProfile(${p.profile_id})" class="text-rose-600 font-bold hover:underline">Suspend (Via Acc)</button>
                </div>
            `).join('');
        }

        async function suspendProfile(id) {
            await fetch(`${API}/profiles/${id}/suspend`, { method: 'PATCH', headers: getHeaders() });
            searchProfiles();
        }
    </script>
</body>
</html>
