<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Boundary · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter">

    <div id="loginView" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-96">
            <h2 class="text-2xl font-bold text-slate-900 mb-6 text-center">User Admin Login</h2>
            <input type="email" id="loginEmail" placeholder="Admin Email" class="w-full mb-4 px-4 py-2 border rounded-xl bg-slate-50">
            <input type="password" id="loginPass" placeholder="Password" value="password123" class="w-full mb-6 px-4 py-2 border rounded-xl bg-slate-50">
            <button onclick="login()" class="w-full bg-slate-900 text-white font-bold py-2 rounded-xl hover:bg-slate-800">Sign In</button>
        </div>
    </div>

    <div id="dashboardView" class="hidden">
        <nav class="bg-white shadow-sm px-8 py-4 flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-xl font-bold text-slate-900">Admin Control Panel</h1>
            <button onclick="logout()" class="text-slate-500 font-medium hover:text-rose-500">Logout (Story 12)</button>
        </nav>

        <div class="max-w-7xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-4">Core Accounts</h3>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="email" id="accEmail" placeholder="Email Address" class="px-4 py-2 border rounded-xl bg-slate-50">
                    <input type="password" id="accPass" placeholder="Password (Min 6)" class="px-4 py-2 border rounded-xl bg-slate-50">
                    <button onclick="createAccount()" class="col-span-2 bg-slate-900 text-white font-bold py-2 rounded-xl">Create User Account</button>
                </div>
                
                <hr class="my-6 border-slate-100">
                
                <div class="flex gap-2 mb-4">
                    <input type="text" id="searchAccInput" placeholder="Search by email..." class="flex-1 px-4 py-2 border rounded-xl bg-slate-50">
                    <button onclick="searchAccounts()" class="bg-slate-200 text-slate-700 px-6 font-bold rounded-xl">Filter</button>
                </div>
                
                <div id="accountsList" class="space-y-2 max-h-[400px] overflow-y-auto"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-4">User Profiles</h3>
                
                <div class="grid grid-cols-3 gap-4 mb-4">
                    <input type="number" id="profAccId" placeholder="Account ID" class="px-4 py-2 border rounded-xl bg-slate-50">
                    <input type="text" id="profUser" placeholder="Username" class="px-4 py-2 border rounded-xl bg-slate-50">
                    <select id="profRole" class="px-4 py-2 border rounded-xl bg-slate-50">
                        <option value="1">Donee (Role 1)</option>
                        <option value="2">Fundraiser (Role 2)</option>
                        <option value="3">Manager (Role 3)</option>
                    </select>
                    <button onclick="createProfile()" class="col-span-3 bg-blue-600 text-white font-bold py-2 rounded-xl">Link Profile to Account</button>
                </div>
                
                <hr class="my-6 border-slate-100">
                
                <div class="flex gap-2 mb-4">
                    <input type="text" id="searchProfInput" placeholder="Search by username..." class="flex-1 px-4 py-2 border rounded-xl bg-slate-50">
                    <button onclick="searchProfiles()" class="bg-slate-200 text-slate-700 px-6 font-bold rounded-xl">Filter</button>
                </div>
                
                <div id="profilesList" class="space-y-2 max-h-[400px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000/user-admin';
        
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
            };
        }

        // --- Auth (Story 11 & 12) ---
        async function login() {
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPass').value })
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('adminToken', data.access_token);
                    document.getElementById('loginView').classList.add('hidden');
                    document.getElementById('dashboardView').classList.remove('hidden');
                    searchAccounts(); 
                    searchProfiles();
                } else {
                    alert("Login Failed: " + (data.detail || "Unknown error"));
                }
            } catch(e) { alert("Network error: Is backend running?"); }
        }

        function logout() { localStorage.removeItem('adminToken'); location.reload(); }

        // ==========================================
        // --- Accounts Management (Story 6-10) ---
        // ==========================================
        async function createAccount() {
            try {
                const body = JSON.stringify({ email: document.getElementById('accEmail').value, password: document.getElementById('accPass').value });
                const res = await fetch(`${API}/accounts`, { method: 'POST', headers: getHeaders(), body });
                const data = await res.json();
                if(res.ok) { alert("Account Created!"); searchAccounts(); } 
                else { alert("Failed: " + JSON.stringify(data.detail || data)); }
            } catch(e) { console.error(e); }
        }

        async function searchAccounts() {
            try {
                const q = document.getElementById('searchAccInput').value;
                const res = await fetch(`${API}/accounts${q ? '?email='+q : ''}`, { headers: getHeaders() });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.detail || "Server Error");
                if (!Array.isArray(data)) throw new Error("Format error");

                document.getElementById('accountsList').innerHTML = data.map(a => `
                    <div class="flex flex-col p-4 bg-slate-50 rounded-xl border border-slate-100 mb-2 hover:border-slate-300 transition-colors">
                        <div class="flex justify-between items-center">
                            <div><b>ID: ${a.account_id}</b> | ${a.email} <span class="ml-2 text-xs bg-gray-200 px-2 rounded font-bold">${a.status}</span></div>
                            <div class="flex gap-3">
                                <button onclick="viewAccount(${a.account_id})" class="text-emerald-600 text-sm font-bold hover:underline">View</button>
                                <button onclick="updateAccount(${a.account_id}, '${a.email}')" class="text-blue-600 text-sm font-bold hover:underline">Edit Email</button>
                                ${a.is_suspended ? '' : `<button onclick="suspendAccount(${a.account_id})" class="text-rose-600 text-sm font-bold hover:underline">Suspend</button>`}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('accountsList').innerHTML = `<p class="text-rose-500 font-bold p-4">Error: ${err.message}</p>`;
            }
        }

        async function viewAccount(id) {
            try {
                const res = await fetch(`${API}/accounts/${id}`, { headers: getHeaders() });
                if(res.ok) {
                    const data = await res.json();
                    alert(`--- Account Information ---\nID: ${data.account_id}\nEmail: ${data.email}\nStatus: ${data.status}\nSuspended: ${data.is_suspended}`);
                } else alert("Failed to fetch details");
            } catch(e) { alert("Network Error"); }
        }

        async function updateAccount(id, currentEmail) {
            const newEmail = prompt(`Enter new email for Account ID ${id}:`, currentEmail);
            if (!newEmail || newEmail === currentEmail) return;
            
            try {
                const res = await fetch(`${API}/accounts/${id}?email=${encodeURIComponent(newEmail)}`, { 
                    method: 'PATCH', 
                    headers: getHeaders() 
                });
                if(res.ok) { searchAccounts(); alert("Account Email Updated!"); }
                else { const d = await res.json(); alert("Update Failed: " + (d.detail || "Error")); }
            } catch(e) { alert("Network Error"); }
        }

        async function suspendAccount(id) {
            if(!confirm("Are you sure you want to suspend this account?")) return;
            try {
                const res = await fetch(`${API}/accounts/${id}/suspend`, { method: 'POST', headers: getHeaders() });
                if(res.ok) { searchAccounts(); searchProfiles(); }
                else { const d = await res.json(); alert(d.detail); }
            } catch(e) { alert("Network Error"); }
        }

        // ==========================================
        // --- Profiles Management (Story 1-5) ---
        // ==========================================
        async function createProfile() {
            try {
                const body = JSON.stringify({ 
                    account_id: parseInt(document.getElementById('profAccId').value), 
                    username: document.getElementById('profUser').value, 
                    role_id: parseInt(document.getElementById('profRole').value),
                    phone_number: "000-0000"
                });
                const res = await fetch(`${API}/profiles`, { method: 'POST', headers: getHeaders(), body });
                if(res.ok) { alert("Profile Created!"); searchProfiles(); } 
                else { const data = await res.json(); alert("Failed: " + JSON.stringify(data.detail || data)); }
            } catch(e) { console.error(e); }
        }


        async function viewProfile(id) {
            try {
                const res = await fetch(`${API}/profiles/${id}`, { headers: getHeaders() });
                if(res.ok) {
                    const data = await res.json();
                    alert(`--- Profile Information ---\nProfile ID: ${data.profile_id}\nAccount ID: ${data.account_id}\nName: ${data.username}\nPhone: ${data.phone_number || 'N/A'}\nRole: ${data.role_id}`);
                } else {
                    const errText = await res.text();
                    alert("Failed to fetch details. Server said: " + errText.substring(0, 100));
                }
            } catch(e) { alert("Network Error"); }
        }

        async function updateProfile(id, currentName, currentPhone, currentRole) {
            const newName = prompt(`Step 1/3: Enter new username for Profile ID ${id}:`, currentName);
            if (newName === null) return;
            const newPhone = prompt(`Step 2/3: Enter new phone number:`, currentPhone);
            if (newPhone === null) return; 
            const newRole = prompt(`Step 3/3: Enter new Role ID\n0 = Admin\n1 = Donee\n2 = Fundraiser\n3 = Manager`, currentRole);
            if (newRole === null || isNaN(newRole)) return; 

            try {
                const body = JSON.stringify({ username: newName, phone_number: newPhone, role_id: parseInt(newRole) });
                const res = await fetch(`${API}/profiles/${id}`, { method: 'PATCH', headers: getHeaders(), body });
                if(res.ok) { searchProfiles(); } 
                else { const d = await res.json(); alert("Update Failed: " + (d.detail || "Error")); }
            } catch(e) { alert("Network Error"); }
        }

        async function suspendProfile(id) {
            if(!confirm("Are you sure you want to suspend this Profile? This user will still be able to log in, but their role actions will be frozen.")) return;
            try {
                const res = await fetch(`${API}/profiles/${id}/suspend`, { method: 'POST', headers: getHeaders() });
                if(res.ok) { 
                    alert("Profile has been suspended successfully!");
                    searchProfiles(); 
                }
                else { const d = await res.json(); alert(d.detail); }
            } catch(e) { alert("Network Error"); }
        }

        async function searchProfiles() {
            try {
                const q = document.getElementById('searchProfInput').value;
                const res = await fetch(`${API}/profiles${q ? '?username='+q : ''}`, { headers: getHeaders() });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || "Server Error");

                document.getElementById('profilesList').innerHTML = data.map(p => `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100 mb-2 hover:border-slate-300 transition-colors">
                        <div>
                            <b>ID: ${p.profile_id}</b> | AccID: ${p.account_id} 
                            <span class="ml-2 text-xs bg-indigo-100 text-indigo-700 px-2 rounded font-bold">${p.status || 'Active'}</span>
                            <br>
                            <span class="text-sm text-slate-600">Name: ${p.username} | Role: ${p.role_id}</span>
                        </div>
                        <div class="flex flex-col gap-1 text-right">
                            <button onclick="viewProfile(${p.profile_id})" class="text-emerald-600 text-sm font-bold hover:underline">View Detail</button>
                            <button onclick="updateProfile(${p.profile_id}, '${p.username}', '${p.phone_number || ''}', ${p.role_id})" class="text-blue-600 text-sm font-bold hover:underline">Edit Profile</button>
                            ${p.is_suspended ? '' : `<button onclick="suspendProfile(${p.profile_id})" class="text-rose-600 text-sm font-bold hover:underline">Suspend Profile</button>`}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('profilesList').innerHTML = `<p class="text-rose-500 font-bold p-4">Error: ${err.message}</p>`;
            }
        }
        
    </script>
</body>
</html>
