<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Admin Portal · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex overflow-hidden">

    <div id="messageModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform border border-slate-100">
            <div class="p-8 text-center">
                <div id="messageIcon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"></div>
                <h3 id="messageTitle" class="text-xl font-black text-slate-900 mb-2">Notification</h3>
                <p id="messageText" class="text-sm text-slate-500 mb-6"></p>
                <button onclick="closeMessage()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-all">OK</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[90] p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden border border-slate-100">
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">⚠️</div>
                <h3 id="confirmTitle" class="text-xl font-black text-slate-900 mb-2">Confirm Action</h3>
                <p id="confirmText" class="text-sm text-slate-500 mb-6"></p>
                <div class="flex gap-3">
                    <button onclick="closeConfirm()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200">Cancel</button>
                    <button id="confirmExecuteBtn" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl hover:bg-rose-600 shadow-lg shadow-rose-100">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <div id="promptModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[80] p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden border border-slate-100">
            <div class="p-10">
                <h3 id="promptTitle" class="text-2xl font-black text-slate-900 mb-2">Update Information</h3>
                <p id="promptSubtitle" class="text-sm text-slate-500 mb-6"></p>
                <input type="text" id="promptInput" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl mb-6 focus:ring-2 focus:ring-slate-900 outline-none font-bold">
                <div class="flex gap-3">
                    <button onclick="closePrompt()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl">Cancel</button>
                    <button id="promptSubmitBtn" class="flex-1 bg-slate-900 text-white font-bold py-3 rounded-xl">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[70] p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden border border-slate-100">
            <div class="p-10">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span id="detailLabel" class="text-[10px] font-black bg-slate-900 text-white px-2 py-1 rounded uppercase tracking-widest">DETAILS</span>
                        <h3 id="detailMainTitle" class="text-3xl font-black text-slate-900 mt-3">User Detail</h3>
                    </div>
                    <button onclick="closeDetail()" class="text-2xl text-slate-300 hover:text-slate-900">&times;</button>
                </div>
                <div id="detailContent" class="space-y-4 bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8">
                    </div>
                <button onclick="closeDetail()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition-all">Close View</button>
            </div>
        </div>
    </div>
    <div class="w-64 bg-slate-900 text-white flex flex-col justify-between shadow-2xl z-20">
        <div class="p-8">
            <h1 class="text-2xl font-extrabold text-white flex items-center gap-2 mb-10 tracking-tight">
                <span class="bg-white text-slate-900 px-2 py-1 rounded-lg text-sm">SYS</span> ADMIN
            </h1>
            <nav class="flex flex-col gap-3">
                <button onclick="switchTab('accounts')" id="nav-accounts" class="text-left px-4 py-3 rounded-xl bg-slate-800 text-white font-bold transition-all">🔐 Accounts (6-10)</button>
                <button onclick="switchTab('profiles')" id="nav-profiles" class="text-left px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400 font-semibold transition-all">👤 Profiles (1-5)</button>
            </nav>
        </div>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-rose-400 font-bold bg-rose-400/10 hover:bg-rose-400/20 rounded-xl transition-colors">🚪 Logout</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="glass-panel sticky top-0 px-10 py-6 border-b border-slate-200 z-10 flex justify-between items-center">
            <div>
                <h2 id="pageTitle" class="text-3xl font-extrabold text-slate-900 tracking-tight">User Accounts</h2>
                <p id="pageSubtitle" class="text-sm text-slate-500 font-medium mt-1">Manage system access credentials</p>
            </div>
            <div class="flex gap-2 w-96">
                <input type="text" id="searchInput" placeholder="Search..." class="w-full px-4 py-2 border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-slate-900 text-sm">
                <button onclick="executeSearch()" class="bg-slate-900 text-white px-5 py-2 rounded-xl font-bold hover:bg-slate-800 text-sm transition-all">Search</button>
            </div>
        </header>

        <div class="p-10">
            <div id="section-accounts">
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm mb-8 flex items-end gap-4">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">New User Email</label>
                        <input type="email" id="newAccEmail" class="w-full mt-1 px-4 py-2 border rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-900" placeholder="user@example.com">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Password</label>
                        <input type="password" id="newAccPass" class="w-full mt-1 px-4 py-2 border rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-900" placeholder="min 6 chars">
                    </div>
                    <button onclick="createAccount()" class="bg-slate-900 text-white font-bold px-6 py-2 rounded-xl hover:bg-slate-800 h-[42px] shadow-lg transition-all active:scale-95">Create Account</button>
                </div>
                <div id="accountsList" class="grid grid-cols-1 gap-3"></div>
            </div>

            <div id="section-profiles" class="hidden">
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm mb-8 grid grid-cols-5 gap-4 items-end">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Account ID</label>
                        <input type="number" id="newProfAccId" class="w-full mt-1 px-3 py-2 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-slate-900" placeholder="e.g. 15">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Profile Name</label>
                        <input type="text" id="newProfName" class="w-full mt-1 px-3 py-2 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-slate-900" placeholder="Name">
                    </div>
                    <div class="col-span-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Description</label>
                        <input type="text" id="newProfDesc" class="w-full mt-1 px-3 py-2 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-slate-900" placeholder="Profile bio...">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Role</label>
                        <select id="newProfRole" class="w-full mt-1 px-3 py-2 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-slate-900">
                            <option value="1">1 - Donee</option>
                            <option value="2">2 - Fundraiser</option>
                            <option value="3">3 - Platform Manager</option>
                            <option value="0">0 - Admin</option>
                        </select>
                    </div>
                    <button onclick="createProfile()" class="col-span-5 bg-slate-900 text-white font-bold px-4 py-3 rounded-xl hover:bg-slate-800 shadow-lg transition-all active:scale-95">Link New Profile</button>
                </div>
                <div id="profilesList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script src="user_admin.js"></script>
</body>
</html>
