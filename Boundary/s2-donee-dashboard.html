<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter">

    <!-- 动态头部占位符，与之前 profile 保持一致的登录体验 -->
    <header id="dynamicHeader" class="bg-white border-b border-slate-200 px-8 py-3 flex justify-between items-center sticky top-0 z-30"></header>

    <main class="w-full max-w-6xl mx-auto px-6 py-10">
        
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Discover Causes</h1>
                <p class="text-slate-500 mt-2 text-sm">Search, filter, and sort to find projects that need your help.</p>
            </div>
            <!-- 收藏夹切换按钮 -->
            <button id="toggleFavViewBtn" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-sm font-bold border border-rose-100 hover:bg-rose-100 transition flex items-center gap-2">
                <span>♡</span> My Favorites (<span id="favCount">0</span>)
            </button>
        </div>

        <!-- 聚合控制台：S21 (分类), S22 (搜索), S23 (排序) 的完美融合 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-8 sticky top-24 z-20 flex flex-col lg:flex-row gap-4 items-center">
            
            <!-- 关键词搜索 -->
            <div class="relative w-full lg:flex-1">
                <svg class="w-5 h-5 text-slate-400 absolute left-4 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="searchInput" placeholder="Search causes or keywords..." class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:bg-white transition">
            </div>

            <!-- 分类筛选 -->
            <div class="w-full lg:w-48 relative">
                 <select id="categoryFilter" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:bg-white appearance-none cursor-pointer">
                    <option value="">All Categories</option>
                    <option value="1">Education</option>
                    <option value="2">Disaster Relief</option>
                    <option value="3">Healthcare</option>
                    <option value="4">Animals</option>
                    <option value="5">Environment</option>
                    <option value="6">Community</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>

            <div class="hidden lg:block w-px h-8 bg-slate-200 mx-2"></div>

            <!-- 多维排序 -->
            <div class="w-full lg:w-64 relative">
                <select id="sortFilter" class="w-full border-2 border-blue-100 bg-blue-50/50 rounded-xl pl-4 pr-8 py-2.5 text-sm outline-none focus:border-blue-500 cursor-pointer font-bold text-slate-700 appearance-none">
                    <option value="created_at-True">Newest First</option>
                    <option value="created_at-False">Oldest First</option>
                    <option value="target_amount-True">Highest Goal</option>
                    <option value="remaining_amount-True">Most Urgent (Highest Need)</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-blue-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
            
        </div>

        <!-- 结果方块阵列 -->
        <div id="activitiesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="emptyStateMsg" class="hidden py-24 flex flex-col items-center justify-center bg-white rounded-2xl border border-slate-200 border-dashed">
            <p class="text-slate-600 text-sm font-bold">No campaigns match your current filters.</p>
        </div>
    </main>

    <!-- Logout modal -->
    <div id="logoutModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md px-8 py-8 text-center">
            <h3 class="text-xl font-bold text-slate-900">Sign out of System?</h3>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button id="logoutCancel" class="px-5 py-2.5 text-sm font-semibold text-slate-700 bg-white border border-slate-300 rounded-xl hover:bg-slate-50">Cancel</button>
                <button id="logoutConfirm" class="px-5 py-2.5 text-sm font-semibold text-white bg-rose-600 rounded-xl hover:bg-rose-700">Sign out</button>
            </div>
        </div>
    </div>

    <!-- 挂载脚本 -->
    <script src="logout.js"></script>
    <script src="s2-donee-dashboard.js"></script>
</body>
</html>
