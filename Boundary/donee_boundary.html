<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donee Boundary · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter">

    <div id="loginView" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-emerald-200 w-96">
            <h2 class="text-2xl font-bold text-emerald-600 mb-6 text-center">Donee Login</h2>
            <input type="email" id="loginEmail" placeholder="Donee Email" class="w-full mb-4 px-4 py-2 border rounded-xl bg-slate-50">
            <input type="password" id="loginPass" placeholder="Password" value="password123" class="w-full mb-6 px-4 py-2 border rounded-xl bg-slate-50">
            <button onclick="login()" class="w-full bg-emerald-500 text-white font-bold py-2 rounded-xl hover:bg-emerald-600 transition-colors">Login</button>
        </div>
    </div>

    <div id="dashboardView" class="hidden">
        <nav class="bg-white shadow-sm px-8 py-4 flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-xl font-bold text-emerald-600">Donee Portal</h1>
            <button onclick="logout()" class="text-slate-500 font-medium hover:text-rose-500">Logout</button>
        </nav>

        <div class="max-w-6xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-4">Fundraising Activities</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="searchInput" placeholder="Search activities..." class="flex-1 px-4 py-2 border rounded-xl bg-slate-50">
                    <button onclick="loadActivities()" class="bg-emerald-100 text-emerald-700 px-6 font-bold rounded-xl">Search</button>
                </div>
                <div id="activitiesList" class="space-y-4 max-h-[700px] overflow-y-auto pr-2"></div>
            </div>

            <div class="space-y-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold text-slate-800 mb-4">My Favorites</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="searchFavInput" placeholder="Filter favorites..." class="flex-1 px-3 py-1 text-sm border rounded-lg bg-slate-50">
                        <button onclick="loadFavorites()" class="bg-slate-200 text-slate-700 px-4 text-sm font-bold rounded-lg">Find</button>
                    </div>
                    <div id="favoritesList" class="space-y-3 max-h-[250px] overflow-y-auto"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold text-slate-800 mb-4">My Donations</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="searchDonInput" placeholder="Search past donations..." class="flex-1 px-3 py-1 text-sm border rounded-lg bg-slate-50">
                        <button onclick="loadDonations()" class="bg-slate-200 text-slate-700 px-4 text-sm font-bold rounded-lg">Find</button>
                    </div>
                    <div id="donationsList" class="space-y-3 max-h-[250px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000/donee';
        
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('doneeToken')}`
            };
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem('doneeToken', data.access_token);
                    document.getElementById('loginView').classList.add('hidden');
                    document.getElementById('dashboardView').classList.remove('hidden');
                    loadActivities(); loadFavorites(); loadDonations();
                } else {
                    const err = await res.json(); alert("Login failed: " + err.detail);
                }
            } catch (error) { alert("Network error"); }
        }

        function logout() {
            localStorage.removeItem('doneeToken');
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
        }

        async function loadActivities() {
            const q = document.getElementById('searchInput').value;
            const res = await fetch(`${API}/activities${q ? '?title='+q : ''}`, { headers: getHeaders() });
            if (res.status === 401) return logout();
            const data = await res.json();
            document.getElementById('activitiesList').innerHTML = data.map(act => `
                <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 hover:border-emerald-300 transition-colors">
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-slate-800 text-lg">${act.title}</h4>
                        <button onclick="viewActivityDetail(${act.activity_id})" class="text-xs font-bold text-emerald-600 underline">View Detail</button>
                    </div>
                    <p class="text-sm text-slate-500 mt-1 mb-4 line-clamp-2">${act.description}</p>
                    <div class="flex justify-between items-center text-sm font-medium mb-4">
                        <span class="text-emerald-600">Goal: $${act.target_amount}</span>
                        <span class="text-slate-600">Raised: $${act.current_amount}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="donate(${act.activity_id})" class="flex-1 bg-emerald-500 text-white font-bold py-2 rounded-xl hover:bg-emerald-600">Donate</button>
                        <button onclick="toggleFavorite(${act.activity_id})" class="px-4 py-2 bg-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-300">★ Save</button>
                    </div>
                </div>
            `).join('');
        }

        // [修复 Story 25] 的具体实现逻辑
        async function viewActivityDetail(id) {
            try {
                const res = await fetch(`${API}/activities/${id}`, { headers: getHeaders() });
                if(res.ok) {
                    const act = await res.json();
                    alert(`=== ${act.title} ===\n\nDescription:\n${act.description}\n\nStatus: ${act.status}\nGoal: $${act.target_amount}\nRaised: $${act.current_amount}`);
                }
            } catch(e) { alert("Error loading details"); }
        }

        async function toggleFavorite(activity_id) {
            const res = await fetch(`${API}/favorites/${activity_id}`, { method: 'POST', headers: getHeaders() });
            if(res.ok) { loadFavorites(); alert("Favorites updated!"); }
        }

        async function loadFavorites() {
            try {
                const q = document.getElementById('searchFavInput').value;
                const res = await fetch(`${API}/favorites${q ? '?title='+q : ''}`, { headers: getHeaders() });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.detail || "Server Error");

                document.getElementById('favoritesList').innerHTML = data.map(fav => `
                    <div class="bg-emerald-50 p-5 rounded-2xl border border-emerald-100 hover:border-emerald-300 transition-all mb-4 shadow-sm">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-emerald-900 text-lg">${fav.activity_title}</h4>
                            <button onclick="viewActivityDetail(${fav.activity_id})" class="text-xs font-bold text-emerald-600 underline">View Detail</button>
                        </div>
                        <p class="text-xs text-slate-500 mt-1 mb-4 line-clamp-2">${fav.description}</p>
                        
                        <div class="flex justify-between items-center text-xs font-bold mb-4">
                            <span class="text-emerald-700">Goal: $${fav.target_amount}</span>
                            <span class="text-slate-600">Raised: $${fav.current_amount}</span>
                        </div>
                        
                        <div class="flex gap-2">
                            <button onclick="donate(${fav.activity_id})" class="flex-1 bg-emerald-500 text-white font-bold py-2 rounded-xl text-sm hover:bg-emerald-600 transition-colors">Donate</button>
                            <button onclick="toggleFavorite(${fav.activity_id})" class="px-3 py-2 bg-rose-100 text-rose-600 font-bold rounded-xl text-xs hover:bg-rose-200">Remove ★</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('favoritesList').innerHTML = `<p class="text-rose-500 text-sm p-4">Error loading favorites.</p>`;
            }
        }

        async function donate(activity_id) {
            const amount = prompt("Enter donation amount ($):");
            if (!amount || isNaN(amount) || amount <= 0) return alert("Invalid amount.");
            const message = prompt("Leave a message (Optional):") || "";
            
            const body = JSON.stringify({ amount: parseFloat(amount), message: message, anonymous: false });
            const res = await fetch(`${API}/activities/${activity_id}/donate`, { method: 'POST', headers: getHeaders(), body });
            
            if(res.ok) { alert("Thank you for your donation!"); loadActivities(); loadDonations(); } 
            else { const err = await res.json(); alert("Failed: " + err.detail); }
        }

        async function loadDonations() {
            try {
                const q = document.getElementById('searchDonInput').value;
                const res = await fetch(`${API}/donations${q ? '?title='+q : ''}`, { headers: getHeaders() });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Server Error");

                document.getElementById('donationsList').innerHTML = data.map(don => `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col mb-2 cursor-pointer hover:border-emerald-500 transition-all" onclick="viewDonationDetail(${don.donation_id})">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Click to view details</p>
                                <h4 class="font-bold text-slate-800">${don.activity_title}</h4>
                            </div>
                            <span class="inline-block bg-emerald-100 text-emerald-700 font-black px-3 py-1 rounded-lg">$${don.amount.toFixed(2)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function viewDonationDetail(donation_id) {
            try {
                const res = await fetch(`${API}/donations/${donation_id}`, { headers: getHeaders() });
                if (!res.ok) return alert("Error fetching details");
                const d = await res.json();
                alert(`--- Donation Details [#${d.donation_id}] ---\n\nActivity: ${d.activity_title}\nAmount Paid: $${d.amount.toFixed(2)}\nDate: ${d.created_at}\nAnonymous: ${d.is_anonymous ? "Yes 🕵️" : "No"}\nMessage: "${d.message}"`);
            } catch (e) { alert("Network error"); }
        }
    </script>
</body>
</html>
