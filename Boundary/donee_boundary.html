<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donee Portal · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 flex h-screen overflow-hidden">

    <div id="loginView" class="fixed inset-0 bg-emerald-50 flex items-center justify-center z-50">
        <div class="bg-white p-10 rounded-[2rem] shadow-2xl border border-emerald-100 w-[420px]">
            <div class="text-center mb-10">
                <div class="bg-emerald-500 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg shadow-emerald-200">💚</div>
                <h2 class="text-3xl font-extrabold text-slate-900">Welcome Back</h2>
                <p class="text-sm text-slate-500 mt-2">Log in to continue making an impact</p>
            </div>
            <input type="email" id="loginEmail" placeholder="Donee Email" class="w-full mb-4 px-5 py-4 border border-slate-200 rounded-2xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-sm font-medium">
            <input type="password" id="loginPass" placeholder="Password" value="password123" class="w-full mb-8 px-5 py-4 border border-slate-200 rounded-2xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-sm font-medium">
            <button onclick="login()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl hover:bg-emerald-600 transition-all shadow-lg shadow-emerald-200 transform hover:-translate-y-0.5">Sign In</button>
        </div>
    </div>

    <div id="dashboardView" class="hidden w-full h-full flex">
        
        <div class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between shadow-sm z-10">
            <div class="p-8">
                <h1 class="text-2xl font-extrabold text-emerald-600 flex items-center gap-2 mb-10">
                    💚 GiveHope
                </h1>
                <nav class="flex flex-col gap-3">
                    <button onclick="switchTab('discover')" id="nav-discover" class="text-left px-4 py-3 rounded-xl bg-emerald-50 text-emerald-700 font-bold transition-all">🌍 Discover</button>
                    <button onclick="switchTab('favorites')" id="nav-favorites" class="text-left px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-500 font-semibold transition-all">❤️ My Favorites</button>
                    <button onclick="switchTab('donations')" id="nav-donations" class="text-left px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-500 font-semibold transition-all">📜 Donation History</button>
                </nav>
            </div>
            <div class="p-6 border-t border-slate-100">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-rose-500 font-bold bg-rose-50 hover:bg-rose-100 rounded-xl transition-colors">🚪 Logout</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col h-full bg-slate-50 overflow-y-auto">
            
            <header class="glass-panel sticky top-0 px-10 py-6 border-b border-slate-200 z-10 flex justify-between items-center">
                <h2 id="pageTitle" class="text-2xl font-bold text-slate-800">Discover Activities</h2>
                <div class="flex gap-2 w-96">
                    <input type="text" id="searchInput" placeholder="Search activities by title..." class="w-full px-4 py-2 border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                    <button onclick="executeSearch()" class="bg-slate-800 text-white px-5 py-2 rounded-xl font-bold hover:bg-slate-700 text-sm">Search</button>
                </div>
            </header>

            <div class="p-10">
                
                <div id="section-activities" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>

                <div id="section-donations" class="hidden">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                    <th class="p-5 font-bold">Donation ID</th>
                                    <th class="p-5 font-bold">Activity Name</th>
                                    <th class="p-5 font-bold">Amount</th>
                                    <th class="p-5 font-bold">Date</th>
                                    <th class="p-5 font-bold text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="donationsList" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="donateModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl shadow-2xl w-[500px] overflow-hidden transform transition-all">
            <div class="bg-emerald-500 p-6 text-white relative">
                <button onclick="closeModal()" class="absolute top-4 right-4 text-emerald-100 hover:text-white bg-emerald-600/50 rounded-full w-8 h-8 flex items-center justify-center font-bold">&times;</button>
                <div class="text-xs font-bold uppercase tracking-widest text-emerald-100 mb-1">Fundraising Campaign</div>
                <h3 id="modalTitle" class="text-2xl font-bold leading-tight">Activity Title</h3>
            </div>
            
            <div class="p-8">
                <p id="modalDesc" class="text-slate-600 text-sm mb-6 leading-relaxed">Description goes here...</p>
                
                <div class="mb-8">
                    <div class="flex justify-between text-xs font-bold text-slate-500 mb-2">
                        <span>Raised: $<span id="modalCurrent">0</span></span>
                        <span>Goal: $<span id="modalTarget">1000</span></span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-3">
                        <div id="modalProgress" class="bg-emerald-500 h-3 rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <div class="space-y-4 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Donation Amount ($)</label>
                        <input type="number" id="donateAmount" placeholder="e.g. 50.00" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-lg text-emerald-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Message of Support (Optional)</label>
                        <input type="text" id="donateMessage" placeholder="Keep fighting!" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer mt-2">
                        <input type="checkbox" id="donateAnon" class="w-4 h-4 text-emerald-500 rounded focus:ring-emerald-500">
                        <span class="text-sm font-semibold text-slate-600">Donate Anonymously</span>
                    </label>
                </div>

                <div class="flex gap-3 mt-8">
                    <button onclick="toggleFavoriteFromModal()" id="modalFavBtn" class="px-5 py-3 border-2 border-slate-200 text-slate-500 font-bold rounded-xl hover:bg-rose-50 hover:text-rose-500 hover:border-rose-200 transition-colors">❤️ Save</button>
                    <button onclick="submitDonation()" class="flex-1 bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-transform active:scale-95 shadow-md">Make Donation</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';
        let token = localStorage.getItem('doneeToken') || null;
        let currentTab = 'discover'; 
        let currentActivityId = null;

        if(token) showDashboard();

        function getHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        }

        // --- AUTH (Story 29, 30) ---
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            try {
                const res = await fetch(`${API}/donee/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.access_token;
                    localStorage.setItem('doneeToken', token);
                    showDashboard();
                } else alert(data.detail || "Login failed");
            } catch (err) { alert("Server error."); }
        }

        async function logout() {
            if(confirm("Log out of your Donee account?")) {
                await fetch(`${API}/donee/logout`, { method: 'POST', headers: getHeaders() });
                localStorage.removeItem('doneeToken');
                token = null;
                document.getElementById('loginView').style.display = 'flex';
                document.getElementById('dashboardView').style.display = 'none';
            }
        }

        function showDashboard() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('dashboardView').style.display = 'flex';
            switchTab('discover');
        }

        // --- NAVIGATION & SEARCH ---
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('searchInput').value = ''; // Reset search
            
            // Update UI Styles
            const activeClass = "text-left px-4 py-3 rounded-xl bg-emerald-50 text-emerald-700 font-bold transition-all";
            const inactiveClass = "text-left px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-500 font-semibold transition-all";
            
            document.getElementById('nav-discover').className = tab === 'discover' ? activeClass : inactiveClass;
            document.getElementById('nav-favorites').className = tab === 'favorites' ? activeClass : inactiveClass;
            document.getElementById('nav-donations').className = tab === 'donations' ? activeClass : inactiveClass;

            // Show/Hide Sections
            document.getElementById('section-activities').style.display = (tab === 'discover' || tab === 'favorites') ? 'grid' : 'none';
            document.getElementById('section-donations').style.display = tab === 'donations' ? 'block' : 'none';
            
            // Set Titles & Load Data
            if(tab === 'discover') { document.getElementById('pageTitle').innerText = "🌍 Discover Activities"; loadActivities(); }
            if(tab === 'favorites') { document.getElementById('pageTitle').innerText = "❤️ My Favorites"; loadFavorites(); }
            if(tab === 'donations') { document.getElementById('pageTitle').innerText = "📜 Donation History"; loadDonations(); }
        }

        function executeSearch() {
            const query = document.getElementById('searchInput').value;
            if(currentTab === 'discover') loadActivities(query);
            if(currentTab === 'favorites') loadFavorites(query);
            // Story 31 requires searching past donations, but backend API currently doesn't take 'title' query for donations, so we skip search for donations.
        }

        // --- ACTIVITIES & FAVORITES (Story 24, 26, 27, 28) ---
        async function loadActivities(query = '') {
            const res = await fetch(`${API}/donee/activities${query ? '?title='+query : ''}`, { headers: getHeaders() });
            if(res.status === 401 || res.status === 403) return logout();
            renderActivityCards(await res.json(), false);
        }

        async function loadFavorites(query = '') {
            const res = await fetch(`${API}/donee/favorites${query ? '?title='+query : ''}`, { headers: getHeaders() });
            const favorites = await res.json();
            // Map favorites to extract the activity object for rendering
            const activities = favorites.map(f => f.activity).filter(a => a != null);
            renderActivityCards(activities, true);
        }

        function renderActivityCards(activities, isFavoriteView) {
            document.getElementById('section-activities').innerHTML = activities.map(a => {
                const progress = Math.min((a.current_amount / a.target_amount) * 100, 100);
                return `
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-xl transition-all cursor-pointer group" onclick="openModal(${a.activity_id})">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-emerald-100 text-emerald-700 text-xs font-black px-2 py-1 rounded tracking-widest uppercase">Ongoing</span>
                        ${isFavoriteView ? `<span class="text-rose-500 text-xl">❤️</span>` : ''}
                    </div>
                    <h3 class="font-bold text-xl text-slate-800 mb-2 group-hover:text-emerald-600 transition-colors">${a.title}</h3>
                    <p class="text-sm text-slate-500 line-clamp-2 mb-6">${a.description}</p>
                    
                    <div class="mt-auto">
                        <div class="flex justify-between text-xs font-bold text-slate-800 mb-2">
                            <span>$${a.current_amount.toFixed(2)}</span>
                            <span class="text-slate-400">Goal: $${a.target_amount.toFixed(2)}</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-2">
                            <div class="bg-emerald-500 h-2 rounded-full" style="width: ${progress}%"></div>
                        </div>
                    </div>
                </div>
            `}).join('') || `<div class="col-span-full text-center py-20 text-slate-400 font-bold text-lg">No activities found.</div>`;
        }

        // --- MODAL & DONATION (Story 25, Donate) ---
        async function openModal(id) {
            currentActivityId = id;
            const res = await fetch(`${API}/donee/activities/${id}`, { headers: getHeaders() });
            const a = await res.json();
            
            document.getElementById('modalTitle').innerText = a.title;
            document.getElementById('modalDesc').innerText = a.description;
            document.getElementById('modalCurrent').innerText = a.current_amount.toFixed(2);
            document.getElementById('modalTarget').innerText = a.target_amount.toFixed(2);
            
            const progress = Math.min((a.current_amount / a.target_amount) * 100, 100);
            setTimeout(() => { document.getElementById('modalProgress').style.width = `${progress}%`; }, 100);

            // Reset inputs
            document.getElementById('donateAmount').value = '';
            document.getElementById('donateMessage').value = '';
            document.getElementById('donateAnon').checked = false;

            document.getElementById('donateModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('donateModal').classList.add('hidden');
            document.getElementById('modalProgress').style.width = '0%';
        }

        async function toggleFavoriteFromModal() {
            const res = await fetch(`${API}/donee/favorites/${currentActivityId}`, { method: 'POST', headers: getHeaders() });
            const data = await res.json();
            alert(data.message);
            if(currentTab === 'favorites') loadFavorites(); // refresh if we un-favorited
        }

        async function submitDonation() {
            const amount = parseFloat(document.getElementById('donateAmount').value);
            const message = document.getElementById('donateMessage').value;
            const anonymous = document.getElementById('donateAnon').checked;

            if(!amount || amount <= 0) return alert("Please enter a valid amount.");

            const res = await fetch(`${API}/donee/activities/${currentActivityId}/donate`, {
                method: 'POST', headers: getHeaders(),
                body: JSON.stringify({ amount, message: message || null, anonymous })
            });

            const data = await res.json();
            if(res.ok) {
                alert(`Thank you! You successfully donated $${amount.toFixed(2)}!`);
                closeModal();
                if(currentTab === 'discover') loadActivities();
                if(currentTab === 'favorites') loadFavorites();
            } else alert(data.detail);
        }

        // --- DONATION HISTORY (Story 31, 32) ---
        async function loadDonations() {
            const res = await fetch(`${API}/donee/donations`, { headers: getHeaders() });
            const donations = await res.json();
            
            document.getElementById('donationsList').innerHTML = donations.map(d => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-5 font-mono text-sm text-slate-500">#${d.donation_id}</td>
                    <td class="p-5 font-bold text-slate-800">${d.activity_title}</td>
                    <td class="p-5 font-black text-emerald-600">$${d.amount.toFixed(2)}</td>
                    <td class="p-5 text-sm text-slate-500">${d.created_at.split('T')[0]}</td>
                    <td class="p-5 text-right">
                        <button onclick="viewDonationDetail(${d.donation_id})" class="text-sm font-bold bg-white border border-slate-200 text-slate-600 px-3 py-1 rounded-lg hover:bg-slate-100">View Receipt</button>
                    </td>
                </tr>
            `).join('') || `<tr><td colspan="5" class="text-center py-10 text-slate-400 font-bold">No past donations found.</td></tr>`;
        }

        async function viewDonationDetail(id) {
            const res = await fetch(`${API}/donee/donations/${id}`, { headers: getHeaders() });
            const d = await res.json();
            alert(`📃 DONATION RECEIPT\n\nDonation ID: #${d.donation_id}\nActivity: ${d.activity_title}\nAmount: $${d.amount.toFixed(2)}\nDate: ${d.created_at}\nAnonymous: ${d.is_anonymous ? 'Yes' : 'No'}\nMessage: "${d.message}"`);
        }
    </script>
</body>
</html>
