<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Detail · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- 确保 Tailwind 脚本加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter">

    <!-- 动态导航栏容器 -->
    <header id="dynamicHeader" class="bg-white border-b border-slate-200 px-8 py-3 flex justify-between items-center sticky top-0 z-30"></header>

    <main class="w-full max-w-6xl mx-auto px-6 py-10">
        <!-- 面包屑导航 -->
        <p class="text-sm text-slate-500 mb-6">
            <a href="s2-donee-dashboard.html" class="hover:text-blue-600">Discover</a> 
            <span class="mx-1.5 text-slate-400">/</span> 
            <span id="crumbCategory" class="text-slate-400">Category</span> 
            <span class="mx-1.5 text-slate-400">/</span> 
            <span id="crumbCampaign" class="text-slate-900 font-semibold italic">Campaign Title</span>
        </p>

        <div id="notFoundBox" class="hidden mt-5 bg-amber-50 text-amber-700 text-sm p-4 rounded-xl border border-amber-100"></div>

        <div id="layout" class="hidden grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-8 mt-6">
            <!-- 左侧主内容 -->
            <div class="space-y-6">
                <!-- 活动大图/图标区 -->
                <div id="hero" class="rounded-3xl h-80 flex items-center justify-center text-8xl bg-white border border-slate-200 shadow-sm transition-all"></div>

                <article class="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                    <span id="categoryPill" class="inline-flex px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider">Category</span>
                    <h1 id="title" class="text-4xl font-extrabold text-slate-900 mt-4 leading-tight"></h1>
                    
                    <div class="mt-4 flex items-center gap-3">
                        <div id="creatorAvatar" class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold"></div>
                        <p class="text-sm text-slate-600">Created by <span id="creatorName" class="text-slate-900 font-bold"></span></p>
                        <span id="verifiedPill" class="hidden inline-flex items-center gap-1 text-[10px] text-emerald-700 font-bold bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-100">✓ Verified</span>
                    </div>

                    <div class="mt-10">
                        <div class="flex items-end justify-between mb-4">
                            <div>
                                <p id="raisedFigure" class="text-4xl font-black text-slate-900"></p>
                                <p id="raisedSub" class="text-sm text-slate-500 font-medium mt-1"></p>
                            </div>
                            <p id="percentFigure" class="text-3xl font-black text-blue-600"></p>
                        </div>
                        <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
                            <div id="progressBar" class="bg-blue-600 h-full transition-all duration-1000" style="width:0%"></div>
                        </div>
                    </div>

                    <div class="mt-6 pt-6 border-t border-slate-100 flex gap-6 text-sm text-slate-500 font-semibold">
                        <span class="flex items-center gap-2">👥 <span id="metaSupporters">0</span></span>
                        <span class="flex items-center gap-2">⏱ 60 days left</span>
                        <span class="flex items-center gap-2">📍 Global Relief</span>
                    </div>

                    <hr class="my-8 border-slate-100">

                    <h2 class="text-xl font-bold text-slate-900 mb-4">About this campaign</h2>
                    <p id="description" class="text-slate-600 leading-relaxed whitespace-pre-wrap"></p>
                </article>
            </div>

            <!-- 右侧捐款区 -->
            <aside class="self-start lg:sticky lg:top-28 space-y-4">
                <div class="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                    <h3 class="text-lg font-bold text-slate-900">Support this cause</h3>
                    <p class="text-xs text-slate-500 mt-1">Directly impact this mission</p>

                    <div id="donationStateBlock" class="mt-6">
                        <div class="relative">
                            <span class="absolute left-4 top-3 text-slate-400 font-bold">$</span>
                            <input id="amount" type="number" value="50" class="w-full border-2 border-slate-100 bg-slate-50 rounded-2xl pl-8 pr-4 py-3 text-lg font-bold outline-none focus:border-blue-500 focus:bg-white transition-all">
                        </div>

                        <div class="grid grid-cols-4 gap-2 mt-4">
                            <button class="preset border border-slate-200 rounded-xl py-2 text-xs font-bold hover:bg-slate-50 transition" data-amount="25">$25</button>
                            <button class="preset border border-slate-200 rounded-xl py-2 text-xs font-bold hover:bg-slate-50 transition" data-amount="50">$50</button>
                            <button class="preset border border-slate-200 rounded-xl py-2 text-xs font-bold hover:bg-slate-50 transition" data-amount="100">$100</button>
                            <button class="preset border border-slate-200 rounded-xl py-2 text-xs font-bold hover:bg-slate-50 transition" data-amount="250">$250</button>
                        </div>

                        <textarea id="message" rows="3" placeholder="Add a personal message..." class="w-full mt-4 border-2 border-slate-100 bg-slate-50 rounded-2xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:bg-white transition-all resize-none"></textarea>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 mt-4 cursor-pointer">
                            <input type="checkbox" id="anonCheck" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            Make my donation anonymous
                        </label>

                        <button id="donateBtn" class="mt-6 w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
                            ♡ Donate now
                        </button>
                    </div>

                    <div id="donationDisabled" class="hidden mt-6 bg-slate-50 border border-slate-200 rounded-2xl p-5 text-sm text-slate-600">
                        <p id="disabledMsg" class="font-bold text-slate-900"></p>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button class="flex-1 bg-white border border-slate-200 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 transition flex items-center justify-center gap-2">🔖 Save</button>
                    <button class="flex-1 bg-white border border-slate-200 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 transition flex items-center justify-center gap-2">📤 Share</button>
                </div>
            </aside>
        </div>

        <!-- 捐款成功提示 -->
        <div id="donateToast" class="hidden fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-50 animate-bounce">
            <span class="text-emerald-400 font-bold text-xl">✓</span>
            <span id="donateToastMsg" class="text-sm font-bold"></span>
        </div>
    </main>

    <!-- 登出弹窗 -->
    <div id="logoutModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center">
            <h3 class="text-xl font-bold text-slate-900 mb-2">Sign out?</h3>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button id="logoutCancel" class="py-3 text-sm font-bold text-slate-500 hover:text-slate-900 transition">Cancel</button>
                <button id="logoutConfirm" class="py-3 text-sm font-bold text-white bg-rose-600 rounded-2xl hover:bg-rose-700 transition">Sign out</button>
            </div>
        </div>
    </div>

    <script src="logout.js"></script>
    <script src="s20-campaign-detail.js"></script>
</body>
</html>
