<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S26 - Platform Insights · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 集成 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter">

    <!-- 动态导航栏容器 -->
    <header id="dynamicHeader" class="bg-white border-b border-slate-200 px-8 py-3 flex justify-between items-center sticky top-0 z-30"></header>

    <main class="w-full max-w-5xl mx-auto px-6 py-10">
        
        <div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <p class="text-sm text-slate-500">Dashboard <span class="mx-1.5 text-slate-400">/</span> <span class="text-slate-900 font-semibold">Platform Insights</span></p>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight mt-1">Category Popularity</h1>
                <p class="text-slate-500 mt-2 text-sm">Understand where platform focus and urgent social needs lie.</p>
            </div>
            
            <div class="w-full md:w-64">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Timeframe Filter</label>
                <select id="timeframeFilter" class="w-full border-2 border-indigo-100 bg-indigo-50/50 rounded-xl px-4 py-2.5 text-sm font-semibold outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 cursor-pointer text-slate-700 transition">
                    <option value="allTime">All Time Data</option>
                    <option value="last30Days">Last 30 Days (Demo)</option>
                </select>
            </div>
        </div>

        <!-- 图表卡片 -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 min-h-[450px] flex flex-col relative overflow-hidden">
            <h2 class="text-lg font-bold text-slate-800 mb-6 border-b border-slate-100 pb-4">Social Focus Distribution</h2>

            <!-- 加载状态 -->
            <div id="loadingOverlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center">
                <div class="w-10 h-10 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                <p class="text-sm font-bold text-slate-600">Aggregating database categories...</p>
            </div>

            <!-- 图表容器 -->
            <div id="chartContainer" class="flex-grow flex items-center justify-center relative w-full h-[350px]">
                <canvas id="popularityChart"></canvas>
            </div>

            <!-- 无数据提示 -->
            <div id="emptyStateBox" class="hidden absolute inset-0 bg-white z-20 flex flex-col items-center justify-center p-6 text-center">
                <p class="text-slate-800 text-lg font-bold mb-2">No statistical data available</p>
            </div>
        </div>
    </main>

    <!-- Logout modal -->
    <div id="logoutModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center">
            <h3 class="text-xl font-bold text-slate-900 mb-2">Sign out?</h3>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button id="logoutCancel" class="py-3 text-sm font-bold text-slate-500 hover:text-slate-900 transition">Cancel</button>
                <button id="logoutConfirm" class="py-3 text-sm font-bold text-white bg-rose-600 rounded-2xl hover:bg-rose-700 transition">Sign out</button>
            </div>
        </div>
    </div>

    <script src="logout.js"></script>
    <script src="s26-view-charts-donee.js"></script>
</body>
</html>
