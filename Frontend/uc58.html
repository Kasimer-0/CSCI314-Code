<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC 58 - Update User Information</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 flex flex-col font-inter items-center justify-center pt-10">

    <main class="w-full max-w-lg px-6">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            
            <!-- 表单头部 -->
            <div class="px-8 py-6 border-b border-slate-100 bg-slate-50">
                <div class="flex items-center gap-2 mb-1">
                    <span class="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded font-bold">UC #58</span>
                </div>
                <h2 class="text-2xl font-bold text-slate-900">Update Basic Information</h2>
                <p class="text-sm text-slate-500 mt-1">Modify the selected user's details below.</p>
            </div>

            <!-- UC 58 Alternative Flow: 错误提示区 -->
            <div id="errorMessage" class="hidden mx-8 mt-5 bg-red-50 text-red-600 text-sm p-4 rounded-xl border border-red-100"></div>

            <!-- UC 58 Normal Flow 6: 成功提示区 -->
            <div id="successMessage" class="hidden mx-8 mt-5 bg-emerald-50 text-emerald-700 text-sm p-4 rounded-xl border border-emerald-100 font-semibold">
                User's basic information updated successfully! Returning to list...
            </div>

            <!-- UC 58 Normal Flow 2 & 3: 编辑表单区 -->
            <div class="p-8 space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Username *</label>
                    <input type="text" id="editUsername" class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address *</label>
                    <input type="email" id="editEmail" class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Role Assigned</label>
                    <select id="editRole" class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 bg-white">
                        <option value="Fundraiser">Fundraiser</option>
                        <option value="Donee">Donee</option>
                        <option value="User Admin">User Admin</option>
                    </select>
                </div>
            </div>

            <!-- UC 58 Normal Flow 4 & Sub Flow 1: 表单按钮区 -->
            <div class="px-8 py-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button id="cancelBtn" class="px-6 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-300 rounded-xl hover:bg-slate-50 transition">Cancel</button>
                <button id="saveBtn" class="px-6 py-2.5 text-sm font-semibold text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition">Save Changes</button>
            </div>

        </div>
    </main>

    <script src="data.js"></script>
    <script src="uc58.js"></script>
</body>
</html>
