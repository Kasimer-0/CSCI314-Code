<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile · Fundraising System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 font-inter">

    <!-- 动态导航栏容器：JS 会在这里注入正确的身份栏 -->
    <header id="dynamicHeader" class="bg-white border-b border-slate-200 px-8 py-3 flex justify-between items-center sticky top-0 z-20"></header>

    <main class="w-full max-w-5xl mx-auto px-6 py-10">
        <div class="flex items-start justify-between mb-8">
            <div>
                <p class="text-sm text-slate-500">Dashboard <span class="mx-1.5 text-slate-400">/</span> <span id="crumbName" class="text-slate-900 font-semibold">Profile</span></p>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight mt-1"><span id="titleName">User</span>'s Profile</h1>
                <p class="text-slate-500 mt-1.5 text-sm">Manage your personal information and account settings</p>
            </div>
            <button onclick="window.location.href='s4-edit-profile.html'" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-blue-700 shadow-sm flex items-center gap-2 cursor-pointer">
                Edit Profile
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-[300px_1fr] gap-6">
            <!-- 左侧：头像与状态 -->
            <div class="bg-white rounded-2xl border border-slate-200 p-8 flex flex-col items-center text-center self-start shadow-sm">
                <div id="avatarInitials" class="w-24 h-24 bg-blue-100 text-blue-600 text-3xl font-bold rounded-full flex items-center justify-center"></div>
                <h2 id="cardName" class="text-xl font-bold text-slate-900 mt-5">Loading...</h2>
                <p id="cardEmail" class="text-sm text-slate-500 mt-1"></p>
                <div id="statusBadge" class="mt-4 inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span><span id="statusText">Unknown</span>
                </div>
            </div>

            <!-- 右侧：详情卡片 -->
            <div class="space-y-6">
                <div class="bg-white rounded-2xl border border-slate-200 p-7 shadow-sm">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-base font-bold text-slate-900">Personal Information</h3>
                        <span class="text-slate-400">👤</span>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-8">
                        <div>
                            <p class="text-xs font-semibold text-slate-500 mb-1">Full name</p>
                            <p id="infoName" class="text-sm font-bold text-slate-900"></p>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-500 mb-1">Email address</p>
                            <p id="infoEmail" class="text-sm font-bold text-slate-900"></p>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-500 mb-1">Phone</p>
                            <p id="infoPhone" class="text-sm font-bold text-slate-900">—</p>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-500 mb-1">Role</p>
                            <span id="infoRole" class="inline-flex px-2.5 py-1 rounded-md text-[11px] font-semibold bg-blue-50 text-blue-700"></span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-200 p-7 shadow-sm">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-base font-bold text-slate-900">Account Settings</h3>
                        <span class="text-slate-400">⚙</span>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <p class="text-xs font-semibold text-slate-500 mb-1">Member since</p>
                            <p id="infoDate" class="text-sm font-bold text-slate-900"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Logout modal -->
    <div id="logoutModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md px-8 py-8 text-center">
            <h3 class="text-xl font-bold text-slate-900">Sign out of System?</h3>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button id="logoutCancel" class="px-5 py-2.5 text-sm font-semibold text-slate-700 bg-white border border-slate-300 rounded-xl hover:bg-slate-50">Cancel</button>
                <button id="logoutConfirm" class="px-5 py-2.5 text-sm font-semibold text-white bg-rose-600 rounded-xl hover:bg-rose-700">Sign out</button>
            </div>
        </div>
    </div>

    <script src="logout.js"></script>
    <script src="s3-view-profile.js"></script>
</body>
</html>
