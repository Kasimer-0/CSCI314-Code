<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage User Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 flex flex-col font-inter">

    <!-- Header (No IAM Module Tag) -->
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">FS</div>
            <span class="text-lg font-bold text-slate-900">Fundraising System</span>
        </div>
        <button class="bg-[#CC0000] text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-red-700 transition shadow-sm">Logout</button>
    </header>

    <main class="w-full max-w-6xl mx-auto px-6 py-10">
        
        <!-- Use Case Description -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Manage User Accounts</h1>
            <p class="text-slate-500 mt-2 text-sm">Search users by email or name, and filter the user list by their assigned roles.</p>
        </div>

        <!-- UC 57: Search & Filter Controls -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 flex flex-col md:flex-row gap-4 items-end">
            <!-- Search Input -->
            <div class="flex-1 w-full relative">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Search User</label>
                <div class="relative">
                    <svg class="w-5 h-5 text-slate-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="searchInput" placeholder="Enter name or email address..." class="w-full border border-slate-300 rounded-xl pl-10 pr-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
                </div>
            </div>
            <!-- Role Filter -->
            <div class="w-full md:w-56">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Role Filter</label>
                <select id="roleFilter" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white">
                    <option value="all">All Roles</option>
                    <option value="Fundraiser">Fundraiser</option>
                    <option value="Donee">Donee</option>
                    <option value="User Admin">User Admin</option>
                </select>
            </div>
            <!-- Actions -->
            <div class="flex gap-3">
                <button id="searchBtn" class="bg-slate-900 text-white px-6 py-2.5 text-sm rounded-xl font-medium hover:bg-slate-800 transition">Search</button>
                <button id="clearBtn" class="bg-white border border-slate-300 text-slate-600 px-6 py-2.5 text-sm rounded-xl font-medium hover:bg-slate-50 transition">Clear</button>
            </div>
        </div>

        <!-- UC 57: User Data Table -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">User Details</th>
                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Role Assigned</th>
                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Account Status</th>
                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100 bg-white text-sm">
                    <!-- Injected by script.js -->
                </tbody>
            </table>
        </div>

    </main>

    <script src="data.js"></script>
    <script src="script-UC57.js"></script>
</body>
</html>
