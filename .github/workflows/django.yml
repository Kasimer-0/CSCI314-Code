stages:
  - test
  - deploy

run_unit_tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r requirements.txt
    - pip install pytest httpx
  script:
    - echo "Running automated unit tests..."
    - pytest tests/
  only:
    - main
    - merge_requests

deploy_to_production:
  stage: deploy
  image: curlimages/curl:latest
  [cite_start]needs: [run_unit_tests] # 只有测试通过才会执行部署 
  script:
    - echo "Test passed, automatic deployment is being triggered via Webhook...."
    - curl -X POST $DEPLOY_WEBHOOK_URL
  only:
    - main # 仅在合并到主分支时部署
