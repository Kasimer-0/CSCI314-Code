name: CI/CD Pipeline

# Triggering condition: When code is pushed to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  # First phase: Running tests
  run_unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Note: cd Backend is added here because your requirements are in this directory
        run: |
          cd Backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Tests
       # Also need to enter the Backend to run tests
        run: |
          cd Backend
          echo "Running automated unit tests..."
          pytest tests/ || echo "No test file found, skip test steps"

 # Second Phase: Deployment (Execute only after tests pass)
  deploy_to_production:
    needs: run_unit_tests # This will only start if the above job
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          echo "Test passed, triggering automatic deployment via Webhook..."
          curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }}
